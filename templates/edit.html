<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Task — TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0f0e11;
    --surface: #1a1820;
    --border:  #2e2b38;
    --accent:  #c9f542;
    --accent2: #f5a742;
    --text:    #e8e4f0;
    --muted:   #7a7490;
    --red:     #ff5f5f;
    --radius:  14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .edit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%;
    max-width: 520px;
  }
  .edit-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    margin-bottom: .3rem;
  }
  .edit-card h1 span { color: var(--accent2); }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 2rem; }
  label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .4rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  input[type="text"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    padding: .8rem 1rem;
    outline: none;
    margin-bottom: 1.2rem;
    transition: border-color .2s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent2); }
  textarea { resize: vertical; min-height: 90px; }
  .btn-row { display: flex; gap: .7rem; margin-top: .4rem; }
  .btn-save {
    flex: 1;
    background: var(--accent2);
    color: #0f0e11;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: .95rem;
    padding: .8rem;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-save:hover { opacity: .88; }
  .btn-cancel {
    text-decoration: none;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: .9rem;
    padding: .8rem 1.4rem;
    transition: all .15s;
  }
  .btn-cancel:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="edit-card">
  <h1>Edit <span>Task</span></h1>
  <p class="subtitle">Update the details below and save.</p>

  <form method="POST">
    <label>Title *</label>
    <input type="text" name="title" value="{{ task.title }}" required>

    <label>Description</label>
    <input type="text" name="description" value="{{ task.description }}">

    <div class="btn-row">
      <button type="submit" class="btn-save">Save Changes</button>
      <a href="/" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>

</body>
</html>
